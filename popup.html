<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #fff;
      color: #1a1a1a;
      padding: 20px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #111;
    }

    button {
      width: 100%;
      padding: 10px 16px;
      background: #d97706;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) {
      background: #b45309;
    }

    button:disabled {
      background: #d1d5db;
      color: #9ca3af;
      cursor: not-allowed;
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #6b7280;
      min-height: 18px;
      line-height: 1.4;
    }

    #status.error {
      color: #dc2626;
    }

    #status.success {
      color: #16a34a;
    }
  </style>
</head>
<body>
  <h1>YT Transcript → Claude</h1>
  <button id="btn">Copy &amp; Open Claude</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
